name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # Check if the push contains code changes (not just docs/markdown)
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      has_code_changes: ${{ steps.check.outputs.has_code_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for code changes
        id: check
        run: |
          # Get files changed in the last commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # Check if any non-doc file changed
          CODE_CHANGES=$(echo "$CHANGED" | grep -v -E '^\.(github/)?README\.md$|\.md$|^docs/|^\.github/(?!workflows)' || true)
          if [ -n "$CODE_CHANGES" ]; then
            echo "has_code_changes=true" >> "$GITHUB_OUTPUT"
            echo "Code changes detected"
          else
            echo "has_code_changes=false" >> "$GITHUB_OUTPUT"
            echo "Only documentation changes — skipping release"
          fi

  # Automatically create a semver tag based on conventional commits
  tag:
    name: Determine version and tag
    needs: changes
    if: needs.changes.outputs.has_code_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      new_version: ${{ steps.tag_version.outputs.new_version }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          release_branches: main

  # Create a GitHub Release from the new tag
  github-release:
    name: Create GitHub Release
    needs: tag
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: ${{ needs.tag.outputs.new_version }}
          body: ${{ needs.tag.outputs.changelog }}
          generate_release_notes: false

  # Publish to Maven Central
  publish:
    name: Publish to Maven Central
    needs: [tag, github-release]
    if: needs.tag.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          server-id: central
          server-username: SONATYPE_USERNAME
          server-password: SONATYPE_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build, test, and deploy
        run: mvn clean deploy -Prelease -Drevision=${{ needs.tag.outputs.new_version }} -B
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
