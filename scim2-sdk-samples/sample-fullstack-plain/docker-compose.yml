services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: scimdb
      POSTGRES_USER: scim
      POSTGRES_PASSWORD: scim
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scim -d scimdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    build:
      context: ../shared-keycloak
      dockerfile: Dockerfile
    command: start-dev --import-realm
    environment:
      KC_HTTP_PORT: 9090
      KC_HTTP_ENABLED: true
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: true
      SCIM_ENDPOINT: http://backend:8080/scim/v2
    ports:
      - "9090:9090"
    volumes:
      - ../shared-keycloak/scim-sample-realm.json:/opt/keycloak/data/import/scim-sample-realm.json:ro
    healthcheck:
      test: >-
        bash -c 'exec 3<>/dev/tcp/localhost/9000 &&
        printf "GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 &&
        timeout 3 cat <&3 | grep -q UP'
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # SCIM server — plain JDK HTTP server with PostgreSQL (no Spring Boot)
  backend:
    build:
      context: ../..
      dockerfile: scim2-sdk-samples/sample-fullstack-plain/Dockerfile
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/scimdb
      DATABASE_USER: scim
      DATABASE_PASSWORD: scim
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  frontend:
    build:
      context: ../shared-frontend
      dockerfile: Dockerfile
      args:
        VITE_KEYCLOAK_URL: http://localhost:9090
        VITE_KEYCLOAK_REALM: scim-sample
        VITE_KEYCLOAK_CLIENT_ID: scim-sample-app
        VITE_API_MODE: scim
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
