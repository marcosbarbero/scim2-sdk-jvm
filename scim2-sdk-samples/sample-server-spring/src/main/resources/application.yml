server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:scim-sample
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

scim:
  base-path: /scim/v2
  persistence:
    enabled: true
  bulk:
    enabled: true
    max-operations: 100
  filter:
    enabled: true
    max-results: 200
  etag:
    enabled: true
